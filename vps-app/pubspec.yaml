name: publicnode
description: Industry-grade cross-platform terminal viewer for the PublicNode VPS. Connects via SSH over Cloudflare QUIC tunnels with zero external dependencies.
version: 0.1.0
publish_to: 'none'

homepage: https://github.com/myth-tools/PublicNode
repository: https://github.com/myth-tools/PublicNode
issue_tracker: https://github.com/myth-tools/PublicNode/issues

# Metadata
license: GPLv3
maintainer: shesher <shesher0llms@gmail.comv>
creator: "Shesher Hasan"
organization: "myth-tools"

environment:
  sdk: ^3.6.0
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  xterm: ^4.0.0
  dartssh2: ^2.17.1
  web_socket_channel: ^3.0.3
  flutter_secure_storage: ^10.1.0
  google_fonts: ^8.1.0
  provider: ^6.1.5+1
  yaml: ^3.1.3
  http: ^1.6.0
  crypto: ^3.0.7
  wakelock_plus: ^1.5.2
  file_picker: ^11.0.2
  path_provider: ^2.1.5
  flutter_inappwebview: ^6.2.0-beta.3
  flutter_inappwebview_linux: ^0.1.0-beta.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fastforge: ^0.6.6
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/JetBrainsMono/
  fonts:
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono/JetBrainsMono-Regular.ttf

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21
